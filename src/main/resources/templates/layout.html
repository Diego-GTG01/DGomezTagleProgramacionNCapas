<!doctype html>
<html
  lang="es"
  xmlns:th="https://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Usuarios</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="d-flex flex-column min-vh-100 bg-light">
    <header class="shadow-sm">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-layers-half me-2"></i>RISOSU IT
          </a>
          <span
            class="navbar-text px-3 text-light opacity-75 d-none d-lg-inline"
          >
            <i class="bi bi-person-circle me-1"></i>
            Bienvenido,
            <span class="fw-bold" sec:authentication="name"></span>
          </span>
          <span
            class="navbar-text px-3 text-light opacity-75 d-none d-lg-inline"
          >
            <i class="bi bi-shield-lock me-1"></i>
            Rol:
            <span
              class="badge rounded-pill px-3 py-2 text-uppercase fw-bold shadow-sm"
              th:with="primerRol=${#strings.replace(#authentication.getAuthorities()[0].authority, 'ROLE_', '')}"
              th:classappend="${primerRol == 'Administrador' ? 'bg-danger' : 
                                  primerRol == 'Usuario' ? 'bg-success' : 
                                  primerRol == 'Visualizador' ? 'bg-primary' : 'bg-secondary'}"
              th:text="${primerRol}"
            >
              ROL
            </span>
          </span>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-center">
              <a sec:authorize="hasRole('ROLE_Administrador') or hasRole('ROLE_Editor')"
                class="nav-link px-3 text-white rounded-pill"
                th:with="primerRol=${#strings.replace(#authentication.getAuthorities()[0].authority, 'ROLE_', '')}"
                th:href="${primerRol == 'Administrador' ? '/Usuario' : 
             primerRol == 'Usuario' ? '/Usuario/+${session.idUsuario}' : 
             primerRol == 'Editor' ? '/Usuario' : '/error'}"
              >
                <i class="bi bi-house-door me-1"></i> Inicio
              </a>

              <a
                class="nav-link px-3 text-info"
                th:href="@{/Usuario/Form}"
                sec:authorize="hasRole('ROLE_Administrador')"
              >
                <i class="bi bi-person-plus me-1"></i> Agregar Usuario
              </a>

              <a
                class="nav-link px-3 text-warning"
                th:href="@{/Usuario/cargamasiva}"
                sec:authorize="hasRole('ROLE_Administrador')"
              >
                <i class="bi bi-database-up me-1"></i> Carga Masiva
              </a>

              <form
                id="logoutForm"
                th:action="@{/logout}"
                method="post"
                class="ms-lg-3"
              >
                <input type="hidden" name="logout" value="true" />
                <button
                  type="submit"
                  class="btn btn-danger btn-sm rounded-pill px-4"
                >
                  <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
                </button>
              </form>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-5 flex-grow-1" layout:fragment="body"></main>

    <footer class="bg-dark text-white pt-5 pb-3 mt-auto">
      <div class="container">
        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <h5 class="fw-bold mb-3">RISOSU IT</h5>
            <p class="text-secondary small w-75"></p>
            <div class="d-flex gap-3 fs-5">
              <a href="#" class="text-white opacity-75"
                ><i class="fab fa-twitter"></i
              ></a>
              <a href="#" class="text-white opacity-75"
                ><i class="fab fa-facebook"></i
              ></a>
              <a href="#" class="text-white opacity-75"
                ><i class="fab fa-instagram"></i
              ></a>
              <a href="#" class="text-white opacity-75"
                ><i class="fab fa-linkedin"></i
              ></a>
            </div>
          </div>

          <div class="col-md-6 text-md-end">
            <div class="row">
              <div class="col-6 col-md-12">
                <ul
                  class="list-unstyled d-md-flex justify-content-end gap-4 mb-0"
                >
                  <li>
                    <a
                      href="#"
                      class="text-decoration-none text-secondary small"
                      >Nosotros</a
                    >
                  </li>
                  <li>
                    <a
                      href="#"
                      class="text-decoration-none text-secondary small"
                      >Servicios</a
                    >
                  </li>
                  <li>
                    <a
                      href="#"
                      class="text-decoration-none text-secondary small"
                      >Privacidad</a
                    >
                  </li>
                  <li>
                    <a
                      href="#"
                      class="text-decoration-none text-secondary small"
                      >Términos</a
                    >
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>

        <hr class="border-secondary opacity-25" />

        <div class="text-center mt-4">
          <p class="text-secondary small mb-0">
            &copy; 2024 <span class="fw-bold">Risosu IT</span>. Todos los
            derechos reservados.
          </p>
        </div>
      </div>
    </footer>

    <script>
      document
        .getElementById("logoutForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          Swal.fire({
            title: "¿Cerrar sesión?",
            text: "Tendrás que volver a ingresar para continuar.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#dc3545",
            cancelButtonColor: "#6c757d",
            confirmButtonText: "Sí, salir",
            cancelButtonText: "Cancelar",
            reverseButtons: true,
          }).then((result) => {
            if (result.isConfirmed) {
              this.submit();
            }
          });
        });
    </script>
  </body>
</html>
